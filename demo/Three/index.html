<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>第一个three.js文件_WebGL三维场景</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        /* 隐藏body窗口区域滚动条 */
      }
    </style>
    <!--引入three.js三维引擎-->
    <script src="../../dist/thes.min.js"></script>
  </head>

  <body>
    <script>
      const th = new Thes({
        el: document.body,
        view: 800,
        sceneName: 'scene1',
        width: window?.innerWidth,
        height: window?.innerHeight,
        background: 'rgb(255,255,0)',
      });
      const geo = Thes.createGeometry({
        geometry: 'BoxGeometry',
        material: 'MeshBasicMaterial',
        position: [0, 0, 0],
        materialOption: {
          color: 'rgb(255,0,0)',
        },
      });
      th.add(geo);
    </script>
  </body>
</html>
